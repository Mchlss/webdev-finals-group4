<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart | Beaches Travel Inc.</title>
    <link rel="stylesheet" href="../stylesheets/header-stylesheet.css">
    <link rel="stylesheet" href="../stylesheets/global-stylesheet.css">
    <link rel="stylesheet" href="../stylesheets/my-cart-stylesheet.css">
    
    <script src="../scripts/global-script.js" defer></script>
    <script src="../scripts/my-cart-script.js" defer></script>
</head>

<body>
    <header id="header-placeholder"></header>

    <main>
        <section class="cart-section">
        <h2>Your Shopping Cart</h2>

        <!-- This container holds both the list and the sidebar -->
        <div class="cart-container">
            
            <!-- Left Side: Items -->
            <div class="cart-items-list" id="cartItemsList">
                <!-- JavaScript will render the items here -->
            </div>

            <!-- Right Side: Sidebar -->
            <aside class="cart-summary" id="cartSummary">
                <h3>Order Summary</h3>
                
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="summarySubtotal">₱0.00</span>
                </div>

                <div class="summary-row" id="voucherSummaryRow" style="display: none;">
                    <span id="appliedVoucherLabel">Voucher Discount</span>
                    <span class="discount-text" id="summaryDiscount">-₱0.00</span>
                </div>
                
                <div class="summary-row">
                    <span>VAT (12%)</span>
                    <span id="summaryTaxes">₱0.00</span>
                </div>

                <div class="voucher-use-container">
                    <label for="voucherSelect" class="voucher-label">Apply Redeemed Voucher</label>
                    <select id="voucherSelect" class="voucher-dropdown">
                        <option value="">-- Select an active voucher --</option>
                    </select>
                    <div class="voucher-actions">
                        <a href="my-vouchers.html" class="redeem-more-btn">Redeem More Vouchers 🎟️</a>
                    </div>
                </div>
                
                <hr>
                
                <div class="summary-row total-row">
                    <strong>Total</strong>
                    <strong id="summaryTotal">₱0.00</strong>
                </div>

                <div class="summary-actions">
                    <form action="checkout-success.html" method="POST">
                        <button type="submit" class="checkout-btn">Proceed to Checkout 🌴</button>
                    </form>
                    <a href="offers.html" class="continue-browsing-btn">Continue Browsing</a>
                </div>
            </aside>
        </div>

        <!-- Empty Cart Message -->
        <div id="emptyCartMessage" class="empty-cart-message" style="display: none;">
            <p>Your cart is empty. Ready for another getaway?</p>
            <a href="offers.html" class="shop-btn">Explore Islands ⛵</a>
        </div>
    </section>
    </main>

    <footer class="custom-wave-footer">
        <div class="footer-content">
            <p>&copy; 2026 BEACHES TRAVEL Inc. All rights reserved. Your Palawan Travel Buddy.</p>
        </div>
    </footer>

</body>
</html>
