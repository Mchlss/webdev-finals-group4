<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | Beaches Travel Inc.</title>
    <link rel="stylesheet" href="./stylesheets/profile-stylesheet.css">
</head>

<body>
    <header>
        <nav class="nav-container">
            <div class="logo">
                <img src="./images/beaches-travel-inc-logo.svg" class="logo-img" alt="Beaches Travel Inc. logo">
            </div>
            <div class="nav-menu">
                <ul class="left-group">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="./pages/offers.html">Offers</a></li>
                    <li><a href="./pages/my-vouchers.html">Vouchers</a></li>
                </ul>
                <ul class="right-group">
                    <li><a href="./pages/my-cart.html">Cart (0)</a></li>
                    <li><a href="./pages/my-profile.html">Profile</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>

        <section class="edit-profile-container">

            <h2>Edit Profile</h2>
            <p>Update your account information and travel preferences.</p>

            <form action="my-profile.html">

                <label for="profile-picture">Profile Picture</label><br>
                <input type="file" id="profile-picture">

                <br><br>

                <label for="fullname">Full Name</label><br>
                <input type="text" id="fullname" value="Juan Dela Cruz" required>

                <br><br>

                <label for="email">Email Address</label><br>
                <input type="email" id="email" value="juandelacruz@gmail.com" required>

                <br><br>

                <label for="phone">Phone Number</label><br>
                <input type="tel" id="phone" value="+63 912 345 6789" required>

                <br><br>

                <label for="address">Address</label><br>
                <input type="text" id="address" value="Quezon City, Philippines" required>

                <br><br>

                <label for="favorite-destination">Favorite Destination</label><br>

                <select id="favorite-destination">
                    <option>Duli Beach, El Nido</option>
                    <option selected>Nacpan Beach, El Nido</option>
                    <option>Lio Beach, El Nido</option>
                    <option>Entalula Beach, El Nido</option>
                    <option>White Beach, Port Barton</option>
                    <option>Long Beach, San Vicente</option>
                    <option>Nagtabon Beach, Puerto Princesa</option>
                    <option>Onoc Island, Balabac</option>
                </select>

                <br><br>

                <button type="submit">Save Changes</button>
                <a href="my-profile.html">
                    <button type="button">Cancel</button>
                </a>

            </form>

        </section>

    </main>

    <footer>
        <p>© 2026 Beaches Travel Inc.</p>
        <p>Your gateway to Palawan's finest beaches.</p>
    </footer>

</body>
</html>
