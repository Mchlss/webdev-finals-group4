<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | Beaches Travel Inc.</title>

    <link rel="stylesheet" href="../stylesheets/header-stylesheet.css">
    <link rel="stylesheet" href="../stylesheets/global-stylesheet.css">
    <link rel="stylesheet" href="../stylesheets/my-profile-stylesheet.css">
    <link rel="stylesheet" href="../stylesheets/edit-profile-stylesheet.css">

    <script src="../scripts/global-script.js" defer></script>
    <script src="../scripts/edit-profile-script.js" defer></script>
</head>

<body>

<header id="header-placeholder"></header>

<main>

<div class="edit-profile-container">

    <div class="edit-title">
        <h1>Edit Profile</h1>
        <p>Update your account information and personalize your travel experience.</p>
    </div>

    <div class="edit-card">

        <form id="editProfileForm" class="edit-form">

            <!-- LEFT SIDE -->

            <div class="profile-upload">

                <img src="../images/icons/profile-icon.svg" alt="Profile Picture">

                <label class="upload-btn">
                    Change Picture
                    <input type="file" id="profile-picture" hidden>
                </label>

            </div>

            <!-- RIGHT SIDE -->

            <div class="form-section">

                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input
                        type="text"
                        id="fullname"
                        value="Juan Dela Cruz"
                        required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        value="juandelacruz@gmail.com"
                        required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input
                        type="tel"
                        id="phone"
                        value="+63 912 345 6789"
                        required>
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <input
                        type="text"
                        id="address"
                        value="Quezon City, Philippines"
                        required>
                </div>

                <div class="form-group full-width">

                    <label for="favorite-destination">
                        Favorite Destination
                    </label>

                    <select id="favorite-destination">

                        <option>Duli Beach, El Nido</option>
                        <option selected>Nacpan Beach, El Nido</option>
                        <option>Lio Beach, El Nido</option>
                        <option>Entalula Beach, El Nido</option>
                        <option>White Beach, Port Barton</option>
                        <option>Long Beach, San Vicente</option>
                        <option>Nagtabon Beach, Puerto Princesa</option>
                        <option>Onok Island, Balabac</option>

                    </select>

                </div>

                <div class="form-group full-width">

                    <label for="bio">
                        Travel Bio
                    </label>

                    <textarea
                        id="bio"
                        placeholder="Tell us about your dream vacation..."></textarea>
                </div>

                <div class="button-group">

                    <a href="my-profile.html">
                        <button type="button" class="cancel-btn">
                            Cancel
                        </button>
                    </a>

                    <button
                        type="submit"
                        class="save-btn">
                        Save Changes
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

</main>

<footer class="footer">
        <div class="footer-content">
            <!-- Logo and Tagline -->
            <div class="footer-section">
                <img src="../images/icons/beaches-travel-inc-logo.svg" alt="Beaches Travel Logo" class="footer-logo">
            </div>

            <!-- Quick Links -->
            <div class="footer-section">
                <h3>Quick Links</h3>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="../pages/offers.html">Offers</a></li>
                    <li><a href="../pages/my-vouchers.html">Vouchers</a></li>
                    <li><a href="../pages/about-us.html">About us</a></li>
                </ul>
            </div>

            <!-- Socials -->
            <div class="footer-section">
                <h3>Follow Us</h3>
                <div class="social-icons">
                    <a href="https://www.facebook.com"><img src="../images/icons/facebook-icon.svg" alt="Facebook"></a>
                    <a href="https://x.com"><img src="../images/icons/x-icon.svg" alt="X"></a>
                    <a href="https://www.instagram.com"><img src="../images/icons/instagram-icon.svg" alt="Instagram"></a>
                    
                </div>
            </div>
        </div>

        <div class="footer-bottom">
            <p>&copy; 2026 BEACHES TRAVEL Inc. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
