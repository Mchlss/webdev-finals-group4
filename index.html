<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aloha Promo</title>
    <link rel="stylesheet" href="./stylesheets/index-stylesheet.css">
</head>
<body>

    <header>
        <nav class="nav-container">
            <div class="logo">
                <img src="./images/beaches-travel-inc-logo.svg" class="logo-img" alt="Beaches Travel Inc. logo">
            </div>
            <div class="nav-menu">
                <ul class="left-group">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="./pages/offers.html">Offers</a></li>
                    <li><a href="./pages/my-vouchers.html">Vouchers</a></li>
                </ul>
                <ul class="right-group">
                    <li>
                        <a href="./pages/my-cart.html">
                            <img src="./images/cart-icon.svg" class="cart-icon" alt="Cart Icon">
                            <span>(<span id="cart-count">0</span>)</span>
                        </a> 
                    </li>
                    <li>
                        <a href="./pages/my-profile.html">
                            <img src="./images/profile-icon.svg" class="profile-icon" alt="Profile Icon">
                        </a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="main-message">
            
            <h1>Say Aloha to Savings</h1>
            <p><strong>Current Promotion:</strong> Book today and get 15% 
                off your first tropical excursion!</p>
            <a href="#promos" class="cta-btn">Claim Your Discount 🍍</a>
        </section>

        <p class="hint-text" id="promos">Click a card below to reveal your surprise promo code! 👇</p>

        <section class="features">
            <div class="feature-wrapper">
                <input type="checkbox" id="promo1" class="promo-checkbox">
                <label for="promo1" class="feature-card">
                    <div class="card-front">
                        <div class="feature-icon">🍹</div>
                        <h3>Refreshingly Good</h3>
                        <p>Up to 50% off on all summer essentials. Stay cool.</p>
                    </div>
                    <div class="card-back">
                        <div class="feature-icon">🎉</div>
                        <h3>Your Code:</h3>
                        <p class="secret-code">REFRESH50</p>
                    </div>
                </label>
            </div>

            <div class="feature-wrapper">
                <input type="checkbox" id="promo2" class="promo-checkbox">
                <label for="promo2" class="feature-card">
                    <div class="card-front">
                        <div class="feature-icon">🏄‍♀️</div>
                        <h3>Ride the Wave</h3>
                        <p>New arrivals dropping week. Catch the trends.</p>
                    </div>
                    <div class="card-back">
                        <div class="feature-icon">🌊</div>
                        <h3>Your Code:</h3>
                        <p class="secret-code">SURF20</p>
                    </div>
                </label>
            </div>

            <div class="feature-wrapper">
                <input type="checkbox" id="promo3" class="promo-checkbox">
                <label for="promo3" class="feature-card">
                    <div class="card-front">
                        <div class="feature-icon">🌺</div>
                        <h3>Premium Quality</h3>
                        <p>Crafted with care to bring sunshine to your life.</p>
                    </div>
                    <div class="card-back">
                        <div class="feature-icon">☀️</div>
                        <h3>Your Code:</h3>
                        <p class="secret-code">SUNSHINE</p>
                    </div>
                </label>
            </div>
        </section>
    </main>

</body>
</html>
